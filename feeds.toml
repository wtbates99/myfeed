# Your personal feed config. Edit freely — the script re-reads it every run.

# Max items in the digest. Dense like Drudge, but still finite.
max_items = 36
# Ignore anything older than this many hours (a source can override this —
# useful for feeds that post weekly).
max_age_hours = 48
# Diversity caps: no single feed or topic can hog the digest.
max_per_source = 4
max_per_topic = 8

# Keywords that boost an item's score (case-insensitive substring match on title).
# Add/remove to tune what floats to the top. Score bump per hit is 2.
boost = [
  # your stack
  "python", "snowflake", "dbt", "airflow", "azure", "postgres", "duckdb",
  "polars", "data engineering", "power bi",
  # ai — forecasting/agents/db-integration is the sweet spot
  "forecast", "time series", "time-series", "llm", "claude", "anthropic",
  "openai", "rag", "agent", "text-to-sql",
  # econ/markets
  "fed", "inflation", "rates", "earnings", "s&p", "gdp", "tariff", "jobs report",
  # your teams
  "red sox", "celtics",
  # music you like
  "prog", "kanye", "coheed",
  # ham
  "ham radio", "amateur radio",
]

# Keywords that bury an item (score -5 per hit). Kill clickbait/noise here.
bury = [
  "you won't believe", "sponsored", "deal of the day", "best deals",
  "hands-on", "rumor",
  "rates today", "best cd rates", "mortgage and refinance", "horoscope",
  "power rankings", "fantasy", "betting", "odds", "parlay",
]

